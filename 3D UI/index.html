<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D component</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8fWUE00s/"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="scene">
        <div class="card" id="card">
          <div class="layer layer-1">
            <div class="layer-tool"><i class="fa-brands fa-react"></i><span>React</span></div>
          </div>
          <div class="layer layer-2">
            <div class="layer-tool"><i class="fa-brands fa-js"></i><span>JavaScript</span></div>
          </div>
          <div class="layer layer-3">
            <div class="layer-tool"><i class="fa-brands fa-css3-alt"></i><span>CSS</span></div>
          </div>
          <div class="layer layer-4">
            <div class="layer-tool"><i class="fa-brands fa-sass"></i><span>Sass</span></div>
          </div>
          <div class="layer layer-5">
            <div class="layer-tool"><i class="fa-brands fa-html5"></i><span>HTML</span></div>
          </div>

          <div class="card-top">
            <div class="ai-core">
              <span class="ai-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" role="img" aria-label="AI chip icon">
                  <rect x="16" y="16" width="32" height="32" rx="6"></rect>
                  <rect x="24" y="24" width="16" height="16" rx="2"></rect>
                  <path d="M8 22h8M8 32h8M8 42h8M48 22h8M48 32h8M48 42h8M22 8v8M32 8v8M42 8v8M22 48v8M32 48v8M42 48v8"></path>
                </svg>
              </span>
              <span>AI</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
